<!DOCTYPE html><html lang='ar' dir='rtl'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>التحقق</title><style>body{margin:0;font-family:Tahoma;background:#f4f6f8}.box{max-width:430px;margin:30px auto;background:#fff;padding:25px;border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.15)}h1{color:#177245;text-align:center}label{display:block;margin:15px 0 8px;font-weight:bold}input{width:100%;box-sizing:border-box;padding:14px;font-size:20px;border:1px solid #ccc;border-radius:8px}button{width:100%;margin-top:20px;padding:16px;font-size:24px;background:#177245;color:#fff;border:none;border-radius:8px}#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);align-items:center;justify-content:center;padding:20px}.card{background:#fff;width:92%;max-width:360px;border-radius:20px;padding:25px;box-sizing:border-box;text-align:center}.spinner{display:none;margin:20px auto;width:46px;height:46px;border:5px solid #ddd;border-top:5px solid #177245;border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}a.btn{display:block;text-decoration:none;background:#177245;color:#fff;padding:15px;border-radius:8px;margin-top:18px;font-size:22px}</style></head><body><div class='box'><h1>التحقق من الوثيقة</h1><label>رقم الوثيقة</label><input id='doc'><label>رقم هوية الوارث</label><input id='id'><button onclick='check()'>تحقق</button><div class='spinner' id='spin'></div></div><div id='overlay'><div class='card' id='card'></div></div><script>const docs=[{doc:'469931832',ids:['1112957822'],file:'document.pdf',name:'احمد حسين احمد',date:'1448/01/16'},{doc:'479735149',ids:['2389388709'],file:'document2.pdf',name:'بركي الحسن عاتق',date:'1447/11/17'},{doc:'441505721',ids:['1069721494'],file:'document3.pdf',name:'ناصر احمد ناصر السيد',date:'1444/04/11'},{doc:'480192637',ids:['2594211670'],file:'document4.pdf',name:'محمد بادشاه رحيم خان',date:'1448/01/03'},{doc:'480062188',ids:['1079511372'],file:'document5.pdf',name:'جيمس بينكوك',date:'1448/01/03'},{doc:'478105383',ids:['1018169175'],file:'document6.pdf',name:'عامر محمد ناصر عسيري',date:'1447/12/17'}];function check(){spin.style.display='block';setTimeout(()=>{spin.style.display='none';const d=doc.value.trim(),i=id.value.trim();const r=docs.find(x=>x.doc===d&&x.ids.includes(i));overlay.style.display='flex';if(r){card.innerHTML=`<h2 style='color:#177245'>تم التحقق من صحة الوثيقة</h2><p><b>رقم الوثيقة:</b> ${r.doc}</p>${r.name?`<p><b>اسم المتوفى:</b> ${r.name}</p>`:''}${r.date?`<p><b>تاريخ الإصدار:</b> ${r.date}</p>`:''}<a class='btn' href='${r.file}' target='_blank'>عرض الوثيقة</a><button onclick='overlay.style.display="none"'>إغلاق</button>`;}else{card.innerHTML=`<div style='font-size:60px'>🔺</div><h2>البيانات المدخلة غير صحيحة</h2><p>يرجى التحقق من رقم الوثيقة ورقم هوية الوارث.</p><button onclick='overlay.style.display="none"'>العودة</button>`;}},1000);}</script></body></html>
