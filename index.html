<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التحقق من الوثيقة</title>

<style>

body{

background:#f4f6f8;

font-family:Tahoma;

margin:0;

}



.box{

max-width:500px;

margin:40px auto;

background:white;

padding:30px;

border-radius:15px;

box-shadow:0 0 15px rgba(0,0,0,.15);

}

.title{

font-size:28px;

text-align:center;

margin-bottom:30px;

color:#177245;

font-weight:bold;

}

label{

display:block;

margin-bottom:10px;

font-size:18px;

}

input{

width:100%;

padding:15px;

font-size:18px;

margin-bottom:20px;

border:1px solid #ccc;

border-radius:8px;

box-sizing:border-box;

}

button{

width:100%;

padding:16px;

font-size:22px;

background:#177245;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

}

button:hover{

background:#115b36;

}

#success{

display:none;

margin-top:30px;

background:#eef8f2;

padding:20px;

border-radius:10px;

}

table{

width:100%;

border-collapse:collapse;

}

td{

padding:12px;

border-bottom:1px solid #ddd;

}

</head>

<body>



<div class="box">

</tr>

<td>

</tr>

</table>

<a href="document.pdf">

</div>

</div>
