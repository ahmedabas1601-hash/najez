<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>التحقق من الوثيقة</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,Arial,sans-serif;
}

body{
background:#f3f6f8;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:500px;
background:#fff;
border-radius:18px;
box-shadow:0 10px 35px rgba(0,0,0,.12);
padding:35px;
}

.logo{
width:70px;
height:70px;
margin:auto;
background:#1b8a53;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
color:#fff;
margin-bottom:20px;
}

h1{
text-align:center;
color:#17784d;
margin-bottom:10px;
font-size:32px;
}

.line{
height:4px;
background:#17784d;
border-radius:50px;
margin:20px auto 30px;
width:90%;
}

input{
width:100%;
padding:16px;
font-size:19px;
border:1px solid #ccc;
border-radius:10px;
margin-bottom:18px;
outline:none;
transition:.3s;
}

input:focus{
border-color:#17784d;
}

button{
width:100%;
padding:18px;
background:#17784d;
color:#fff;
border:none;
font-size:22px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#13623f;
}

#result{
display:none;
margin-top:30px;
background:#eef8f2;
border:1px solid #c8e8d5;
padding:20px;
border-radius:12px;
}

.ok{
color:#198754;
font-size:24px;
font-weight:bold;
text-align:center;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
font-size:18px;
}

.download{
display:block;
margin-top:25px;
text-decoration:none;
}

.download button{
background:#1d6efd;
}

.download button:hover{
background:#0d5ad3;
}

footer{
margin-top:30px;
text-align:center;
font-size:14px;
color:#777;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">✓</div>

<h1>التحقق من الوثيقة</h1>

<div class="line"></div>

<input id="doc" placeholder="رقم الوثيقة">

<input id="id" placeholder="رقم هوية الوارث">

<button onclick="verify()">تحقق</button>

<div id="result">

<div class="ok">
تم التحقق من صحة الوثيقة ✓
</div>

<table>

<tr>
<td><b>رقم الوثيقة</b></td>
<td>440192832</td>
</tr>

<tr>
<td><b>رقم هوية الوارث</b></td>
<td>1118662756</td>
</tr>

<tr>
<td><b>اسم المتوفى</b></td>
<td>سعيد عبدالله احمد علوان</td>
</tr>

<tr>
<td><b>تاريخ إصدار الوثيقة</b></td>
<td>1444/12/28</td>
</tr>

</table>

<a class="download" href="document.pdf" target="_blank">
<button>عرض الوثيقة PDF</button>
</a>

</div>

<footer>
© 2026 جميع الحقوق محفوظة
</footer>

</div>

<script>

function verify(){

let doc=document.getElementById("doc").value.trim();

let id=document.getElementById("id").value.trim();

if(doc==="440192832" && id==="1118662756"){

document.getElementById("result").style.display="block";

}else{

alert("رقم الوثيقة أو رقم الهوية غير صحيح.");

}

}

</script>

</body>
</html>
